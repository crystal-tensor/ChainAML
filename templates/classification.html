<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classification · {{ detection_type }}</title>
  <style>
    body { background:#0a0a0f; color:#e8e8f0; font-family:-apple-system, Inter, Arial, sans-serif; margin:0; }
    .header { background:#12121a; border-bottom:1px solid #2a2a33; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
    .container { padding:16px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 12px; border-bottom:1px solid #2a2a33; font-size:14px; }
    .badge { padding:2px 8px; border-radius:12px; font-size:12px; }
    .high { background:#ff6b6b; color:#fff; } .medium { background:#ffa500; color:#fff; } .low { background:#51cf66; color:#fff; }
    a { color:#667eea; text-decoration:none; }
  </style>
</head>
<body>
  <div class="header">
    <div>ChainAML · Classification</div>
    <div style="color:#8a8aa0">Type: <b>{{ detection_type }}</b></div>
  </div>
  <div class="container">
    <table>
      <thead>
        <tr>
          <th>地址/交易ID</th>
          <th>风险(概率)</th>
          <th>来源</th>
          <th>详情</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4" style="color:#8a8aa0">正在加载...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    function normalizeScore(row){
      if(typeof row.risk_score==='number') return row.risk_score;
      if(typeof row.quantum_probability==='number') return Math.min(Math.max(row.quantum_probability,0),1);
      const fields=['spray_score','funnel_score','coinjoin_score','mining_score'];
      for(const f of fields){ if(typeof row[f]==='number') return Math.min(Math.max(row[f],0),1); }
      return 0.5;
    }
    async function load(){
      const type = '{{ detection_type }}';
      const r = await fetch('/api/detection/'+type);
      const j = await r.json();
      const arr = Array.isArray(j.results)? j.results : [];
      const tbody = document.getElementById('tbody');
      tbody.innerHTML='';
      arr.slice(0,100).forEach(row => {
        const id = row.tx_id || row.entity || row.address || '-';
        const s = normalizeScore(row);
        let level='low'; if(s>=0.7) level='high'; else if(s>=0.4) level='medium';
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${id}</td><td><span class="badge ${level}">${(s*100).toFixed(1)}%</span></td><td>${type}</td><td><a href="/detail/${type}">detail</a></td>`;
        tbody.appendChild(tr);
      });
      if(!arr.length) { tbody.innerHTML = '<tr><td colspan="4" style="color:#8a8aa0">暂无数据</td></tr>'; }
    }
    load();
  </script>
</body>
</html>
