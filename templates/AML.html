<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChainAML 协同检测控制台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .header { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: space-between; }
    .header h1 { color: #667eea; font-size: 24px; }
    .nav { display: flex; gap: 12px; }
    .nav a { text-decoration: none; color: #667eea; padding: 8px 12px; background: #f1f3ff; border-radius: 8px; }
    .grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px; margin-top: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .section-title { font-size: 18px; color: #667eea; margin-bottom: 12px; }
    .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .control { border: 1px solid #eee; border-radius: 10px; padding: 12px; }
    .control h3 { font-size: 14px; color: #333; margin-bottom: 8px; }
    .toggle { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
    .slider { width: 100%; }
    .btn { display: inline-block; padding: 10px 16px; border-radius: 8px; background: #667eea; color: #fff; text-decoration: none; border: none; cursor: pointer; }
    .btn.secondary { background: #764ba2; }
    .btn.ghost { background: #f1f3ff; color: #667eea; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat { background: #f8f9fa; border: 1px solid #eee; border-radius: 10px; padding: 12px; text-align: center; }
    .stat .value { color: #667eea; font-weight: 700; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #f8f9fa; color: #667eea; position: sticky; top: 0; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .badge-high { background: #ff6b6b; color: #fff; }
    .badge-medium { background: #ffa500; color: #fff; }
    .badge-low { background: #51cf66; color: #fff; }
    .tx { font-family: Courier, monospace; color: #667eea; cursor: pointer; text-decoration: underline; }
    .inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
    textarea { width: 100%; height: 120px; border: 1px solid #eee; border-radius: 10px; padding: 8px; font-family: monospace; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal-content { background: #fff; margin: 50px auto; padding: 24px; border-radius: 12px; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .close { float: right; cursor: pointer; font-size: 22px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ChainAML 协同检测控制台</h1>
      <div class="nav">
        <a href="/">首页</a>
        <a href="/detail/scoreboard">评分板</a>
        <a href="/aml" class="btn ghost">协同控制台</a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="section-title">算法协同配置</div>
        <div class="controls" id="controlsGrid"></div>
        <div style="margin-top: 12px; display: flex; gap: 8px;">
          <button class="btn" id="loadBtn">加载检测结果</button>
          <button class="btn secondary" id="fuseBtn">融合评分</button>
        </div>
        <div class="inputs">
          <div>
            <div class="section-title">hunt.py 输出(JSON)</div>
            <textarea id="huntInput" placeholder='[{"tx_id":"tx_...","score":0.8}]'></textarea>
            <button class="btn" id="huntLoad">导入 hunt 结果</button>
          </div>
          <div>
            <div class="section-title">slime_mold_sim.py 输出(JSON)</div>
            <textarea id="slimeInput" placeholder='[{"tx_id":"tx_...","score":0.6}]'></textarea>
            <button class="btn" id="slimeLoad">导入 slime 结果</button>
          </div>
          <div>
            <div class="section-title">QSMA.py 输出(JSON)</div>
            <textarea id="qsmaInput" placeholder='[{"tx_id":"tx_...","score":0.9}]'></textarea>
            <button class="btn" id="qsmaLoad">导入 QSMA 结果</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">总体统计</div>
        <div class="stats" id="stats"></div>
      </div>
    </div>

    <div class="card" style="margin-top: 20px;">
      <div class="section-title">协同融合结果</div>
      <table>
        <thead>
          <tr>
            <th>交易ID</th>
            <th>综合风险</th>
            <th>命中算法</th>
            <th>原因</th>
          </tr>
        </thead>
        <tbody id="fusedBody"></tbody>
      </table>
    </div>

    <div class="card" style="margin-top: 20px;">
      <div class="section-title">快速访问</div>
      <div style="display:flex; gap:8px; flex-wrap: wrap;">
        <a class="btn ghost" href="/detail/spray">喷洒</a>
        <a class="btn ghost" href="/detail/funnel">漏斗</a>
        <a class="btn ghost" href="/detail/coinjoin">混币</a>
        <a class="btn ghost" href="/detail/mining">挖矿</a>
        <a class="btn ghost" href="/detail/quantum">量子</a>
        <a class="btn ghost" href="/detail/scoreboard">评分板</a>
      </div>
    </div>

    <div id="txModal" class="modal">
      <div class="modal-content">
        <span class="close" id="modalClose">×</span>
        <h3>交易详情</h3>
        <div id="txDetails"></div>
      </div>
    </div>
  </div>

  <script>
    const algorithms = [
      { key: 'spray', name: '喷洒' },
      { key: 'funnel', name: '漏斗' },
      { key: 'coinjoin', name: '混币' },
      { key: 'mining', name: '挖矿' },
      { key: 'quantum', name: '量子' },
      { key: 'scoreboard', name: '评分板' },
      { key: 'hunt', name: '同频共振' },
      { key: 'slime', name: '黏菌陷阱' },
      { key: 'qsma', name: 'Grover搜索' }
    ];

    const state = { data: {}, enabled: {}, weights: {}, external: { hunt: [], slime: [], qsma: [] } };

    function initControls() {
      const grid = document.getElementById('controlsGrid');
      algorithms.forEach(a => {
        const div = document.createElement('div');
        div.className = 'control';
        const w = state.weights[a.key] ?? 1;
        const en = a.key === 'scoreboard' ? false : true;
        state.enabled[a.key] = en;
        state.weights[a.key] = w;
        div.innerHTML = `
          <h3>${a.name}</h3>
          <div class="toggle">
            <span>启用</span>
            <input type="checkbox" ${en ? 'checked' : ''} data-key="${a.key}" class="enableToggle" />
          </div>
          <div style="margin-top:8px;">
            <input type="range" min="0" max="3" step="0.1" value="${w}" data-key="${a.key}" class="slider" />
            <div style="margin-top:4px; font-size:12px; color:#666;">权重: <span id="w-${a.key}">${w}</span></div>
          </div>
        `;
        grid.appendChild(div);
      });
      grid.querySelectorAll('.enableToggle').forEach(el => el.addEventListener('change', e => { state.enabled[e.target.dataset.key] = e.target.checked; }));
      grid.querySelectorAll('.slider').forEach(el => el.addEventListener('input', e => { state.weights[e.target.dataset.key] = parseFloat(e.target.value); document.getElementById(`w-${e.target.dataset.key}`).textContent = e.target.value; }));
    }

    function normalizeScore(row) {
      const candidates = ['risk_score','quantum_probability','quantum_score','funnel_score','coinjoin_score','mining_score'];
      for (const k of candidates) { if (typeof row[k] === 'number') { return Math.max(0, Math.min(k.includes('score') ? row[k] : row[k], 1)); } }
      return 0.5;
    }

    async function loadDetections() {
      const res = await fetch('/api/detections');
      const json = await res.json();
      state.data = json;
      renderStats();
    }

    function renderStats() {
      const stats = document.getElementById('stats');
      stats.innerHTML = '';
      algorithms.slice(0,6).forEach(a => {
        const arr = Array.isArray(state.data[a.key]) ? state.data[a.key] : [];
        const div = document.createElement('div');
        div.className = 'stat';
        div.innerHTML = `<div>${a.name}</div><div class="value">${arr.length}</div>`;
        stats.appendChild(div);
      });
      ['hunt','slime','qsma'].forEach(k => {
        const div = document.createElement('div');
        div.className = 'stat';
        div.innerHTML = `<div>${k}</div><div class="value">${state.external[k].length}</div>`;
        stats.appendChild(div);
      });
    }

    function fuseScores() {
      const map = new Map();
      algorithms.forEach(a => {
        if (!state.enabled[a.key]) return;
        if (['hunt','slime','qsma'].includes(a.key)) {
          state.external[a.key].forEach(r => {
            const id = r.tx_id || r.entity || '';
            if (!id) return;
            const score = typeof r.score === 'number' ? r.score : normalizeScore(r);
            const w = state.weights[a.key] || 1;
            const cur = map.get(id) || { tx_id: id, total: 0, hits: [], reason: [] };
            cur.total += score * w;
            cur.hits.push(a.name);
            if (r.reason) cur.reason.push(r.reason);
            map.set(id, cur);
          });
        } else {
          const arr = Array.isArray(state.data[a.key]) ? state.data[a.key] : [];
          arr.forEach(r => {
            const id = r.tx_id || r.entity || '';
            if (!id) return;
            const score = normalizeScore(r);
            const w = state.weights[a.key] || 1;
            const cur = map.get(id) || { tx_id: id, total: 0, hits: [], reason: [] };
            cur.total += score * w;
            cur.hits.push(a.name);
            if (r.reason) cur.reason.push(r.reason);
            map.set(id, cur);
          });
        }
      });
      const rows = Array.from(map.values()).sort((a,b) => b.total - a.total).slice(0,100);
      const body = document.getElementById('fusedBody');
      body.innerHTML = '';
      rows.forEach(r => {
        let level = 'badge-low';
        if (r.total >= 2.0) level = 'badge-high'; else if (r.total >= 1.0) level = 'badge-medium';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="tx" onclick="showTx('${r.tx_id}')">${r.tx_id}</span></td>
          <td><span class="badge ${level}">${(r.total*100).toFixed(1)}%</span></td>
          <td>${r.hits.join(', ')}</td>
          <td>${r.reason.join(' | ')}</td>
        `;
        body.appendChild(tr);
      });
    }

    async function showTx(id) {
      try {
        const res = await fetch(`/api/transaction/${id}`);
        const tx = await res.json();
        const el = document.getElementById('txDetails');
        el.innerHTML = '';
        Object.entries(tx).forEach(([k,v]) => {
          const p = document.createElement('div');
          let val = v;
          if (typeof v === 'object' && v !== null) val = JSON.stringify(v, null, 2);
          p.textContent = `${k}: ${val}`;
          el.appendChild(p);
        });
        document.getElementById('txModal').style.display = 'block';
      } catch(e) {}
    }

    document.getElementById('modalClose').onclick = () => { document.getElementById('txModal').style.display = 'none'; };
    window.onclick = (e) => { const m = document.getElementById('txModal'); if (e.target === m) m.style.display = 'none'; };

    document.getElementById('loadBtn').onclick = loadDetections;
    document.getElementById('fuseBtn').onclick = fuseScores;
    document.getElementById('huntLoad').onclick = () => { try { state.external.hunt = JSON.parse(document.getElementById('huntInput').value || '[]'); renderStats(); } catch(e){} };
    document.getElementById('slimeLoad').onclick = () => { try { state.external.slime = JSON.parse(document.getElementById('slimeInput').value || '[]'); renderStats(); } catch(e){} };
    document.getElementById('qsmaLoad').onclick = () => { try { state.external.qsma = JSON.parse(document.getElementById('qsmaInput').value || '[]'); renderStats(); } catch(e){} };

    initControls();
  </script>
</body>
</html>
